<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%); min-height: 100vh; padding: 2rem 0; }
        .booking-card { max-width: 580px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1); overflow: hidden; }
        .booking-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2rem; }
        .booking-header h2 { font-weight: 700; font-size: 1.5rem; margin: 0; }
        .booking-header p { opacity: 0.85; margin: 0.25rem 0 0; font-size: 0.9rem; }
        .booking-body { padding: 2rem; }
        .room-summary { background: #f8fafc; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; }
        .summary-row { display: flex; justify-content: space-between; padding: 0.4rem 0; font-size: 0.9rem; }
        .summary-row .label { color: #64748b; }
        .summary-row .value { font-weight: 500; }
        .form-label { font-weight: 500; font-size: 0.875rem; color: #334155; margin-bottom: 0.4rem; }
        .form-control { border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 0.7rem 0.9rem; font-size: 0.95rem; }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15); outline: none; }
        .price-preview { background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%); padding: 1rem 1.2rem; border-radius: 12px; margin: 1.5rem 0; text-align: center; }
        .price-preview .amount { font-size: 1.6rem; font-weight: 700; color: #065f46; }
        .price-preview .label { color: #065f46; font-size: 0.85rem; opacity: 0.85; }
        .btn-confirm { width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; font-weight: 500; padding: 0.8rem; border-radius: 10px; font-size: 0.95rem; }
        .btn-cancel { display: block; text-align: center; color: #64748b; text-decoration: none; padding: 0.7rem; margin-top: 0.5rem; font-size: 0.875rem; }
        .alert-error { background: #fee2e2; color: #991b1b; padding: 0.8rem 1rem; border-radius: 10px; border-left: 4px solid #dc2626; font-size: 0.875rem; margin-bottom: 1rem; }
    </style>
</head>
<body>

<div class="booking-card">
    <div class="booking-header">
        <h2>Confirm Your Stay</h2>
        <p>Pick your dates and review the total</p>
    </div>

    <div class="booking-body">

        <div th:if="${errorMessage}" class="alert-error" th:text="${errorMessage}"></div>

        <div class="room-summary">
            <div class="summary-row">
                <span class="label">Room</span>
                <span class="value" th:text="${'#' + room.roomNumber + ' (Floor ' + room.floor + ')'}">#101 (Floor 1)</span>
            </div>
            <div class="summary-row">
                <span class="label">Type</span>
                <span class="value" th:text="${room.roomType == 'NonAcRoom' ? 'Non-AC' : (room.roomType == 'AcRoom' ? 'AC' : 'Family')}">Type</span>
            </div>
            <div class="summary-row">
                <span class="label">Category</span>
                <span class="value" th:text="${room.category != null ? room.category.name : '-'}">Standard</span>
            </div>
            <div class="summary-row">
                <span class="label">Base price</span>
                <span class="value" th:text="${'Rs. ' + (room.category != null ? room.category.basePrice : 0) + ' / night'}">Rs. 5000 / night</span>
            </div>
        </div>

        <form th:action="@{/booking/book}" method="post">

            <input type="hidden" name="roomId" th:value="${room.id}">

            <div class="mb-3">
                <label class="form-label">Check-in Date</label>
                <input type="date" name="checkIn" id="checkIn" class="form-control" th:min="${today}" th:value="${today}" required onchange="updatePrice()">
            </div>

            <div class="mb-3">
                <label class="form-label">Check-out Date</label>
                <input type="date" name="checkOut" id="checkOut" class="form-control" th:min="${tomorrow}" th:value="${tomorrow}" required onchange="updatePrice()">
            </div>

            <div class="price-preview">
                <div class="amount" id="estimate">Rs. 0</div>
                <div class="label"><span id="nightCount">0</span> nights × base rate (final total may include surcharges)</div>
            </div>

            <button type="submit" class="btn-confirm">Confirm Booking</button>
            <a th:href="@{/booking/rooms}" class="btn-cancel">← Back to room list</a>
        </form>
    </div>
</div>

<script th:inline="javascript">
    const basePrice = /*[[${room.category != null ? room.category.basePrice : 0}]]*/ 0;

    function updatePrice() {
        const inDate = new Date(document.getElementById('checkIn').value);
        const outDate = new Date(document.getElementById('checkOut').value);
        if (inDate && outDate && outDate > inDate) {
            const nights = Math.round((outDate - inDate) / (1000 * 60 * 60 * 24));
            const estimate = nights * basePrice;
            document.getElementById('estimate').textContent = 'Rs. ' + estimate.toFixed(2);
            document.getElementById('nightCount').textContent = nights;
        } else {
            document.getElementById('estimate').textContent = 'Rs. 0';
            document.getElementById('nightCount').textContent = '0';
        }
    }
    updatePrice();
</script>

</body>
</html>
