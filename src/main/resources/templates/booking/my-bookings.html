<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%); min-height: 100vh; color: #1a202c; }
        .page-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 3rem 0 4rem; margin-bottom: -2.5rem; color: white; }
        .page-header h1 { font-weight: 700; font-size: 2rem; margin: 0; }
        .page-header p { opacity: 0.85; margin: 0.25rem 0 0; }
        .booking-card { background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08); margin-bottom: 1rem; overflow: hidden; display: grid; grid-template-columns: 6px 1fr; }
        .booking-card.PENDING .accent-bar { background: #f59e0b; }
        .booking-card.CONFIRMED .accent-bar { background: #3b82f6; }
        .booking-card.CHECKED_IN .accent-bar { background: #10b981; }
        .booking-card.COMPLETED .accent-bar { background: #6b7280; }
        .booking-card.CANCELLED .accent-bar { background: #dc2626; }
        .booking-content { padding: 1.5rem; }
        .booking-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .booking-id { color: #64748b; font-size: 0.8rem; }
        .room-title { font-weight: 600; font-size: 1.15rem; margin: 0.2rem 0 0; }
        .status-pill { padding: 0.3rem 0.8rem; border-radius: 8px; font-size: 0.75rem; font-weight: 600; }
        .status-PENDING { background: #fef3c7; color: #92400e; }
        .status-CONFIRMED { background: #dbeafe; color: #1e40af; }
        .status-CHECKED_IN { background: #d1fae5; color: #065f46; }
        .status-COMPLETED { background: #e2e8f0; color: #475569; }
        .status-CANCELLED { background: #fee2e2; color: #991b1b; }
        .booking-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; padding: 1rem; background: #f8fafc; border-radius: 10px; margin-bottom: 1rem; }
        .grid-item .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        .grid-item .value { font-weight: 600; margin-top: 0.2rem; }
        .total-row { display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 1px solid #f1f5f9; }
        .total-amount { font-size: 1.4rem; font-weight: 700; color: #1e293b; }
        .total-amount small { font-weight: 400; font-size: 0.8rem; color: #64748b; }
        .btn-cancel-booking { background: #fee2e2; color: #b91c1c; border: none; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 500; font-size: 0.85rem; }
        .empty-state { background: white; border-radius: 16px; padding: 3rem; text-align: center; color: #64748b; }
        .alert-success { background: #d1fae5; color: #065f46; padding: 0.8rem 1rem; border-radius: 10px; margin-bottom: 1rem; }
        .alert-error { background: #fee2e2; color: #991b1b; padding: 0.8rem 1rem; border-radius: 10px; margin-bottom: 1rem; }
        .btn-book-new { background: white; color: #667eea; font-weight: 600; padding: 0.6rem 1.4rem; border-radius: 10px; text-decoration: none; box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
    </style>
</head>
<body>

<div class="page-header">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <a th:href="@{/profile}" style="color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.875rem;">← Back to Profile</a>
            <h1 class="mt-2">My Bookings</h1>
            <p>View and manage your reservations</p>
        </div>
        <a th:href="@{/booking/rooms}" class="btn-book-new">+ New Booking</a>
    </div>
</div>

<div class="container pb-5">

    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert-error" th:text="${errorMessage}"></div>

    <div th:if="${bookings.isEmpty()}" class="empty-state">
        <p>You haven't made any bookings yet.</p>
        <a th:href="@{/booking/rooms}" class="btn-book-new" style="display: inline-block; margin-top: 0.5rem;">Browse Rooms</a>
    </div>

    <div th:each="b : ${bookings}" th:classappend="${'booking-card ' + b.status}">
        <div class="accent-bar"></div>
        <div class="booking-content">
            <div class="booking-top">
                <div>
                    <div class="booking-id" th:text="${'Booking #' + b.id + ' • Booked on ' + b.bookedOn}">Booking #1</div>
                    <div class="room-title">
                        Room <span th:text="${b.room.roomNumber}">101</span>
                        <span style="color: #64748b; font-weight: 400; font-size: 0.95rem;"
                              th:text="${' • ' + (b.room.roomType == 'NonAcRoom' ? 'Non-AC' : (b.room.roomType == 'AcRoom' ? 'AC' : 'Family'))}"></span>
                    </div>
                </div>
                <span th:classappend="${'status-pill status-' + b.status}" th:text="${b.status}">PENDING</span>
            </div>

            <div class="booking-grid">
                <div class="grid-item">
                    <div class="label">Check-in</div>
                    <div class="value" th:text="${b.checkIn}">2026-05-01</div>
                </div>
                <div class="grid-item">
                    <div class="label">Check-out</div>
                    <div class="value" th:text="${b.checkOut}">2026-05-04</div>
                </div>
                <div class="grid-item">
                    <div class="label">Nights</div>
                    <div class="value" th:text="${b.nights}">3</div>
                </div>
                <div class="grid-item">
                    <div class="label">Category</div>
                    <div class="value" th:text="${b.room.category != null ? b.room.category.name : '-'}">Standard</div>
                </div>
            </div>

            <div class="total-row">
                <div class="total-amount">
                    Rs. <span th:text="${b.totalAmount}">0</span>
                    <small> total</small>
                </div>
                <form th:if="${b.status == 'PENDING' or b.status == 'CONFIRMED'}"
                      th:action="@{/booking/cancel/{id}(id=${b.id})}"
                      method="post"
                      style="margin: 0;"
                      onsubmit="return confirm('Are you sure you want to cancel this booking?');">
                    <button type="submit" class="btn-cancel-booking">Cancel Booking</button>
                </form>
                <span th:if="${b.status == 'CHECKED_IN' or b.status == 'COMPLETED'}" class="text-muted small">Cannot cancel</span>
                <span th:if="${b.status == 'CANCELLED'}" class="text-muted small">Cancelled</span>
            </div>
        </div>
    </div>

</div>

</body>
</html>
