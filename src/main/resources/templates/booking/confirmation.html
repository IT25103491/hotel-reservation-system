<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Booking Confirmed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%); min-height: 100vh; padding: 2rem 0; display: flex; align-items: center; }
        .confirm-card { max-width: 580px; width: 100%; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1); overflow: hidden; }
        .confirm-header { background: linear-gradient(135deg, #10b981 0%, #047857 100%); color: white; padding: 3rem 2rem 2rem; text-align: center; }
        .check-circle { width: 64px; height: 64px; background: white; color: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; margin: 0 auto 1rem; }
        .confirm-header h2 { font-weight: 700; font-size: 1.6rem; margin: 0; }
        .confirm-header p { opacity: 0.9; margin: 0.25rem 0 0; }
        .confirm-body { padding: 2rem; }
        .booking-id { background: #f8fafc; text-align: center; padding: 0.8rem; border-radius: 10px; margin-bottom: 1.5rem; font-size: 0.875rem; color: #64748b; }
        .booking-id strong { font-size: 1.05rem; color: #1e293b; }
        .info-row { display: flex; justify-content: space-between; padding: 0.8rem 0; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .info-row:last-child { border: none; }
        .info-label { color: #64748b; }
        .info-value { font-weight: 500; }
        .total-row { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); padding: 1rem 1.2rem; border-radius: 12px; margin-top: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .total-label { color: #92400e; font-weight: 500; }
        .total-amount { color: #92400e; font-size: 1.5rem; font-weight: 700; }
        .actions { margin-top: 1.5rem; display: flex; gap: 0.5rem; }
        .btn-primary-action { flex: 1; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; font-weight: 500; padding: 0.7rem; border-radius: 10px; text-align: center; text-decoration: none; }
        .btn-secondary-action { flex: 1; background: #f1f5f9; color: #475569; padding: 0.7rem; border-radius: 10px; text-align: center; text-decoration: none; }
    </style>
</head>
<body>

<div class="confirm-card">
    <div class="confirm-header">
        <div class="check-circle">✓</div>
        <h2>Booking Confirmed</h2>
        <p>Your stay is reserved</p>
    </div>

    <div class="confirm-body">
        <div class="booking-id">
            Booking Reference: <strong th:text="${'#' + reservation.id}">#1</strong>
        </div>

        <div class="info-row">
            <span class="info-label">Room</span>
            <span class="info-value" th:text="${reservation.room.roomNumber + ' (' + (reservation.room.roomType == 'NonAcRoom' ? 'Non-AC' : (reservation.room.roomType == 'AcRoom' ? 'AC' : 'Family')) + ')'}">101</span>
        </div>
        <div class="info-row">
            <span class="info-label">Check-in</span>
            <span class="info-value" th:text="${reservation.checkIn}">2026-05-01</span>
        </div>
        <div class="info-row">
            <span class="info-label">Check-out</span>
            <span class="info-value" th:text="${reservation.checkOut}">2026-05-04</span>
        </div>
        <div class="info-row">
            <span class="info-label">Nights</span>
            <span class="info-value" th:text="${reservation.nights}">3</span>
        </div>
        <div class="info-row">
            <span class="info-label">Status</span>
            <span class="info-value" th:text="${reservation.status}">PENDING</span>
        </div>

        <div class="total-row">
            <span class="total-label">Total Amount</span>
            <span class="total-amount" th:text="${'Rs. ' + reservation.totalAmount}">Rs. 15000</span>
        </div>

        <div class="actions">
            <a th:href="@{/profile}" class="btn-secondary-action">My Profile</a>
            <a th:href="@{/booking/rooms}" class="btn-primary-action">Book Another</a>
        </div>
    </div>
</div>

</body>
</html>
