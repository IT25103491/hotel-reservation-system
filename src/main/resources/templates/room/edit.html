<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%); min-height: 100vh; padding: 3rem 0; }
        .form-card { max-width: 580px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1); overflow: hidden; }
        .form-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2rem; }
        .form-header h2 { font-weight: 700; font-size: 1.5rem; margin: 0; }
        .form-header p { opacity: 0.85; margin: 0.25rem 0 0; font-size: 0.9rem; }
        .form-body { padding: 2rem; }
        .form-label { font-weight: 500; font-size: 0.875rem; color: #334155; margin-bottom: 0.4rem; }
        .form-control, .form-select { border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 0.7rem 0.9rem; font-size: 0.95rem; }
        .form-control:focus, .form-select:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15); }
        .form-control[readonly] { background: #f8fafc; color: #64748b; }
        .btn-save { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; font-weight: 500; padding: 0.7rem 1.6rem; border-radius: 10px; }
        .btn-cancel { background: #f1f5f9; color: #475569; border: none; font-weight: 500; padding: 0.7rem 1.6rem; border-radius: 10px; margin-left: 0.5rem; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

<div class="form-card">
    <div class="form-header">
        <h2>Edit Room</h2>
        <p>Update room details (type cannot be changed)</p>
    </div>

    <div class="form-body">
        <form th:action="@{/rooms/save}" method="post">

            <input type="hidden" name="id" th:value="${room.id}">

            <div class="mb-3">
                <label class="form-label">Room Type</label>
                <input type="text" class="form-control" th:value="${room.roomType.replace('Room','').toUpperCase()}" readonly>
                <input type="hidden" name="roomType" th:value="${room.roomType.replace('Room','').toUpperCase()}">
            </div>

            <div class="mb-3">
                <label class="form-label">Room Number</label>
                <input type="text" name="roomNumber" class="form-control" th:value="${room.roomNumber}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Floor</label>
                <input type="number" name="floor" class="form-control" th:value="${room.floor}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="categoryId" class="form-select" required>
                    <option th:each="c : ${categories}"
                            th:value="${c.id}"
                            th:text="${c.name + ' (Rs. ' + c.basePrice + ')'}"
                            th:selected="${room.category != null and c.id == room.category.id}"></option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option value="AVAILABLE"   th:selected="${room.status == 'AVAILABLE'}">Available</option>
                    <option value="OCCUPIED"    th:selected="${room.status == 'OCCUPIED'}">Occupied</option>
                    <option value="MAINTENANCE" th:selected="${room.status == 'MAINTENANCE'}">Maintenance</option>
                </select>
            </div>

            <div class="d-flex">
                <button type="submit" class="btn-save">Update Room</button>
                <a th:href="@{/rooms}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
