<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%); min-height: 100vh; padding: 3rem 0; }
        .form-card { max-width: 580px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1); overflow: hidden; }
        .form-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2rem; }
        .form-header h2 { font-weight: 700; font-size: 1.5rem; margin: 0; }
        .form-header p { opacity: 0.85; margin: 0.25rem 0 0; font-size: 0.9rem; }
        .form-body { padding: 2rem; }
        .form-label { font-weight: 500; font-size: 0.875rem; color: #334155; margin-bottom: 0.4rem; }
        .form-control, .form-select { border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 0.7rem 0.9rem; font-size: 0.95rem; }
        .form-control:focus, .form-select:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15); outline: none; }
        .btn-save { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; font-weight: 500; padding: 0.7rem 1.6rem; border-radius: 10px; }
        .btn-cancel { background: #f1f5f9; color: #475569; border: none; font-weight: 500; padding: 0.7rem 1.6rem; border-radius: 10px; margin-left: 0.5rem; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

<div class="form-card">
    <div class="form-header">
        <h2>Add Room</h2>
        <p>Create a new room and assign it to a category</p>
    </div>

    <div class="form-body">

        <div th:if="${errorMessage}" class="alert mb-3"
             style="background: #fee2e2; color: #991b1b; padding: 0.9rem 1rem; border-radius: 10px; border-left: 4px solid #dc2626; font-size: 0.9rem;">
            <strong>Error:</strong> <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/rooms/save}" method="post">

            <div class="mb-3">
                <label class="form-label">Room Type</label>
                <select name="roomType" class="form-select" required>
                    <option value="" disabled selected>Choose type...</option>
                    <option value="NON_AC">Non-AC (base rate)</option>
                    <option value="AC">AC (+15% surcharge)</option>
                    <option value="FAMILY">Family (+ extra bed fee)</option>
                </select>
                <small class="text-muted">Type determines how the price is calculated</small>
            </div>

            <div class="mb-3">
                <label class="form-label">Floor</label>
                <select name="floor" id="floor-select" class="form-select" required onchange="updateRoomNumber()">
                    <option value="" disabled selected>Choose floor...</option>
                    <option value="1">1st Floor</option>
                    <option value="2">2nd Floor</option>
                    <option value="3">3rd Floor</option>
                    <option value="4">4th Floor</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Room Number</label>
                <div class="d-flex align-items-center" style="gap: 0.5rem;">
                    <input type="text" id="floor-prefix" class="form-control" style="width: 70px; text-align: center; background: #f1f5f9; font-weight: 600;" readonly placeholder="—">
                    <input type="number" id="room-suffix" min="1" max="15" class="form-control" placeholder="1-15" required onchange="combineRoomNumber()" oninput="combineRoomNumber()">
                </div>
                <input type="hidden" name="roomNumber" id="full-room-number">
                <small class="text-muted">Pick a floor first, then enter the room number on that floor (1-15)</small>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="categoryId" class="form-select" required>
                    <option value="" disabled selected>Choose category...</option>
                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name + ' (Rs. ' + c.basePrice + ')'}"></option>
                </select>
                <small class="text-muted">Sets the price tag and amenities shown to customers</small>
            </div>

            <div class="mb-4">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option value="AVAILABLE">Available</option>
                    <option value="OCCUPIED">Occupied</option>
                    <option value="MAINTENANCE">Maintenance</option>
                </select>
            </div>

            <div class="d-flex">
                <button type="submit" class="btn-save">Save Room</button>
                <a th:href="@{/rooms}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
    function updateRoomNumber() {
        const floor = document.getElementById('floor-select').value;
        document.getElementById('floor-prefix').value = floor || '';
        combineRoomNumber();
    }

    function combineRoomNumber() {
        const floor = document.getElementById('floor-select').value;
        const suffix = document.getElementById('room-suffix').value;
        if (floor && suffix) {
            const padded = suffix.toString().padStart(2, '0');
            document.getElementById('full-room-number').value = floor + padded;
        } else {
            document.getElementById('full-room-number').value = '';
        }
    }
</script>

</body>
</html>
