<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Rooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%); min-height: 100vh; color: #1a202c; }
        .page-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 3rem 0 4rem; margin-bottom: -2.5rem; color: white; box-shadow: 0 10px 40px rgba(102, 126, 234, 0.2); }
        .page-header h1 { font-weight: 700; font-size: 2rem; letter-spacing: -0.02em; margin: 0; }
        .page-header p { opacity: 0.85; margin: 0.25rem 0 0; }
        .content-card { background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04); padding: 1.5rem; }
        .btn-add { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; font-weight: 500; padding: 0.6rem 1.4rem; border-radius: 10px; box-shadow: 0 4px 14px rgba(102, 126, 234, 0.35); transition: all 0.2s; }
        .btn-add:hover { transform: translateY(-1px); color: white; }
        .table thead th { background: #f8fafc; border: none; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; padding: 1rem; }
        .table tbody td { padding: 1rem; border-color: #f1f5f9; vertical-align: middle; }
        .table tbody tr:hover { background: #f8fafc; }
        .id-pill { background: #eef2ff; color: #4f46e5; padding: 0.2rem 0.6rem; border-radius: 6px; font-weight: 600; font-size: 0.8rem; }
        .type-badge { padding: 0.3rem 0.7rem; border-radius: 8px; font-weight: 600; font-size: 0.8rem; }
        .type-NONAC  { background: #dbeafe; color: #1e40af; }
        .type-AC     { background: #d1fae5; color: #065f46; }
        .type-FAMILY { background: #fce7f3; color: #9f1239; }
        .status-pill { padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.8rem; font-weight: 500; }
        .status-AVAILABLE { background: #d4f4dd; color: #0f5132; }
        .status-OCCUPIED  { background: #fee2e2; color: #b91c1c; }
        .status-MAINTENANCE { background: #fef3c7; color: #92400e; }
        .btn-action { border: none; padding: 0.4rem 0.9rem; border-radius: 8px; font-size: 0.825rem; font-weight: 500; text-decoration: none; display: inline-block; }
        .btn-edit { background: #fff8e1; color: #b45309; }
        .btn-del  { background: #fee2e2; color: #b91c1c; margin-left: 0.3rem; }
        .empty-state { text-align: center; padding: 3rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="page-header">
    <div class="container">
        <h1>Rooms</h1>
        <p>Manage individual rooms across all categories</p>
    </div>
</div>

<div class="container pb-5">
    <div class="content-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="text-muted small" th:text="${rooms.size() + ' rooms'}">0 rooms</span>
            <a th:href="@{/rooms/new}" class="btn-add">+ Add Room</a>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Room #</th>
                <th>Type</th>
                <th>Category</th>
                <th>Floor</th>
                <th>Status</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${rooms}">
                <td><span class="id-pill" th:text="${r.id}"></span></td>
                <td><strong th:text="${r.roomNumber}"></strong></td>
                <td>
					<span class="type-badge"
                          th:classappend="${'type-' + r.roomType.toUpperCase().replace('ROOM','').replace('_','')}"
                          th:text="${r.roomType == 'NonAcRoom' ? 'Non-AC' : (r.roomType == 'AcRoom' ? 'AC' : 'Family')}"></span>
                </td>
                <td th:text="${r.category != null ? r.category.name : '-'}"></td>
                <td th:text="${r.floor}"></td>
                <td><span th:classappend="${'status-pill status-' + r.status}" th:text="${r.status}"></span></td>
                <td class="text-end">
                    <a th:href="@{/rooms/edit/{id}(id=${r.id})}" class="btn-action btn-edit">Edit</a>
                    <a th:href="@{/rooms/delete/{id}(id=${r.id})}"
                       class="btn-action btn-del"
                       onclick="return confirm('Delete this room?');">Delete</a>
                </td>
            </tr>
            <tr th:if="${rooms.isEmpty()}">
                <td colspan="7" class="empty-state">No rooms yet. Click "Add Room" to add one.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
