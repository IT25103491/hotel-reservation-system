<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Room Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%);
            min-height: 100vh;
            color: #1a202c;
        }
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 3rem 0 4rem;
            margin-bottom: -2.5rem;
            color: white;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.2);
        }
        .page-header h1 {
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.02em;
            margin: 0;
        }
        .page-header p {
            opacity: 0.85;
            margin: 0.25rem 0 0;
            font-weight: 400;
        }
        .content-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
            padding: 1.5rem;
            position: relative;
        }
        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: 500;
            padding: 0.6rem 1.4rem;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(102, 126, 234, 0.35);
            transition: all 0.2s;
        }
        .btn-add:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.45);
            color: white;
        }
        .table {
            margin: 0;
        }
        .table thead th {
            background: #f8fafc;
            border: none;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            padding: 1rem;
        }
        .table tbody td {
            padding: 1rem;
            border-color: #f1f5f9;
            vertical-align: middle;
        }
        .table tbody tr {
            transition: background 0.15s;
        }
        .table tbody tr:hover {
            background: #f8fafc;
        }
        .price-badge {
            display: inline-block;
            background: linear-gradient(135deg, #d4f4dd 0%, #c5edd0 100%);
            color: #0f5132;
            padding: 0.3rem 0.7rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .id-pill {
            display: inline-block;
            background: #eef2ff;
            color: #4f46e5;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .btn-action {
            border: none;
            padding: 0.4rem 0.9rem;
            border-radius: 8px;
            font-size: 0.825rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            transition: all 0.15s;
        }
        .btn-edit {
            background: #fff8e1;
            color: #b45309;
        }
        .btn-edit:hover {
            background: #fde68a;
            color: #92400e;
        }
        .btn-del {
            background: #fee2e2;
            color: #b91c1c;
            margin-left: 0.3rem;
        }
        .btn-del:hover {
            background: #fecaca;
            color: #991b1b;
        }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="page-header">
    <div class="container">
        <h1>Room Categories</h1>
        <p>Manage room types, pricing, and amenities</p>
    </div>
</div>

<div class="container pb-5">
    <div class="content-card">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="text-muted small" th:text="${categories.size() + ' categor' + (categories.size() == 1 ? 'y' : 'ies')}">0 categories</span>
            <a th:href="@{/categories/new}" class="btn btn-add">+ Add Category</a>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Base Price</th>
                <th>Amenities</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cat : ${categories}">
                <td><span class="id-pill" th:text="${cat.id}"></span></td>
                <td><strong th:text="${cat.name}"></strong></td>
                <td class="text-muted" th:text="${cat.description}"></td>
                <td><span class="price-badge" th:text="${'Rs. ' + cat.basePrice}"></span></td>
                <td class="text-muted small" th:text="${cat.amenities}"></td>
                <td class="text-end">
                    <a th:href="@{/categories/edit/{id}(id=${cat.id})}" class="btn-action btn-edit">Edit</a>
                    <a th:href="@{/categories/delete/{id}(id=${cat.id})}"
                       class="btn-action btn-del"
                       onclick="return confirm('Delete this category?');">Delete</a>
                </td>
            </tr>
            <tr th:if="${categories.isEmpty()}">
                <td colspan="6" class="empty-state">
                    No categories yet. Click "Add Category" to create your first one.
                </td>
            </tr>
            </tbody>
        </table>

    </div>
</div>

</body>
</html>
