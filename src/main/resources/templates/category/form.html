<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Category Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%);
            min-height: 100vh;
            color: #1a202c;
            padding: 3rem 0;
        }
        .form-card {
            max-width: 580px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1), 0 4px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
        }
        .form-header h2 {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            margin: 0;
        }
        .form-header p {
            opacity: 0.85;
            margin: 0.25rem 0 0;
            font-size: 0.9rem;
        }
        .form-body {
            padding: 2rem;
        }
        .form-label {
            font-weight: 500;
            font-size: 0.875rem;
            color: #334155;
            margin-bottom: 0.4rem;
        }
        .form-control {
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 0.7rem 0.9rem;
            font-size: 0.95rem;
            transition: all 0.15s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }
        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: 500;
            padding: 0.7rem 1.6rem;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(102, 126, 234, 0.35);
            transition: all 0.2s;
        }
        .btn-save:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.45);
            color: white;
        }
        .btn-cancel {
            background: #f1f5f9;
            color: #475569;
            border: none;
            font-weight: 500;
            padding: 0.7rem 1.6rem;
            border-radius: 10px;
            margin-left: 0.5rem;
            transition: all 0.15s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-cancel:hover {
            background: #e2e8f0;
            color: #1e293b;
        }
        .error-text {
            color: #dc2626;
            font-size: 0.825rem;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>

<div class="form-card">
    <div class="form-header">
        <h2 th:text="${category.id == null} ? 'Add Category' : 'Edit Category'">Form</h2>
        <p th:text="${category.id == null} ? 'Create a new room category' : 'Update existing category details'">Subtitle</p>
    </div>

    <div class="form-body">
        <form th:action="@{/categories/save}" th:object="${category}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" th:field="*{name}" placeholder="e.g. Deluxe Suite">
                <div class="error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Briefly describe this category"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Base Price (Rs.)</label>
                <input type="number" step="0.01" class="form-control" th:field="*{basePrice}" placeholder="5000.00">
                <div class="error-text" th:if="${#fields.hasErrors('basePrice')}" th:errors="*{basePrice}"></div>
            </div>

            <div class="mb-4">
                <label class="form-label">Amenities</label>
                <input type="text" class="form-control" th:field="*{amenities}" placeholder="WiFi, AC, TV, Mini-bar">
            </div>

            <div class="d-flex">
                <button type="submit" class="btn-save">Save Category</button>
                <a th:href="@{/categories}" class="btn-cancel">Cancel</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
