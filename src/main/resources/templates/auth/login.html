<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%); min-height: 100vh; display: flex; align-items: center; padding: 2rem 0; }
        .auth-card { max-width: 420px; width: 100%; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1); overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2.5rem 2rem; text-align: center; }
        .auth-header h2 { font-weight: 700; font-size: 1.6rem; margin: 0; }
        .auth-header p { opacity: 0.85; margin: 0.25rem 0 0; font-size: 0.9rem; }
        .auth-body { padding: 2rem; }
        .form-label { font-weight: 500; font-size: 0.875rem; color: #334155; margin-bottom: 0.4rem; }
        .form-control { border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 0.7rem 0.9rem; font-size: 0.95rem; }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15); outline: none; }
        .btn-submit { width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; font-weight: 500; padding: 0.8rem; border-radius: 10px; font-size: 0.95rem; }
        .btn-submit:hover { color: white; transform: translateY(-1px); }
        .auth-footer { text-align: center; padding: 1rem; background: #f8fafc; color: #64748b; font-size: 0.875rem; }
        .auth-footer a { color: #667eea; font-weight: 500; text-decoration: none; }
        .alert-error { background: #fee2e2; color: #991b1b; padding: 0.8rem 1rem; border-radius: 10px; border-left: 4px solid #dc2626; font-size: 0.875rem; margin-bottom: 1rem; }
        .alert-success { background: #d1fae5; color: #065f46; padding: 0.8rem 1rem; border-radius: 10px; border-left: 4px solid #10b981; font-size: 0.875rem; margin-bottom: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Sign in to your account</p>
        </div>

        <div class="auth-body">
            <div th:if="${successMessage}" class="alert-success">
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert-error">
                <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/login}" method="post">

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Your password" required>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>
            </form>
        </div>

        <div class="auth-footer">
            Don't have an account? <a th:href="@{/register}">Create one</a>
        </div>
    </div>
</div>

</body>
</html>
