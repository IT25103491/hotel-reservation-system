<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%); min-height: 100vh; color: #1a202c; }
        .page-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 3rem 0 4rem; margin-bottom: -2.5rem; color: white; box-shadow: 0 10px 40px rgba(102, 126, 234, 0.2); }
        .page-header h1 { font-weight: 700; font-size: 2rem; letter-spacing: -0.02em; margin: 0; }
        .page-header p { opacity: 0.85; margin: 0.25rem 0 0; }
        .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .content-card { background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08); padding: 2rem; }
        .card-title { font-weight: 600; font-size: 1.05rem; margin-bottom: 1rem; color: #1e293b; }
        .info-row { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid #f1f5f9; }
        .info-row:last-child { border: none; }
        .info-label { color: #64748b; font-size: 0.875rem; }
        .info-value { font-weight: 500; }
        .points-display { text-align: center; padding: 1.5rem; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); border-radius: 12px; margin-bottom: 1.5rem; }
        .points-number { font-size: 2.5rem; font-weight: 700; color: #92400e; }
        .points-label { color: #92400e; font-size: 0.875rem; opacity: 0.85; }
        .form-label { font-weight: 500; font-size: 0.875rem; color: #334155; margin-bottom: 0.4rem; }
        .form-control { border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 0.7rem 0.9rem; font-size: 0.95rem; }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15); outline: none; }
        .form-control[readonly] { background: #f8fafc; color: #64748b; }
        .btn-save { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; font-weight: 500; padding: 0.6rem 1.4rem; border-radius: 10px; }
        .btn-logout { background: #fee2e2; color: #b91c1c; border: none; font-weight: 500; padding: 0.6rem 1.4rem; border-radius: 10px; text-decoration: none; display: inline-block; }
        .alert-success { background: #d1fae5; color: #065f46; padding: 0.8rem 1rem; border-radius: 10px; border-left: 4px solid #10b981; font-size: 0.875rem; margin-bottom: 1rem; }
        @media (max-width: 768px) { .profile-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container d-flex justify-content-between align-items-center">
    <div>
        <h1>My Profile</h1>
        <p>Welcome back, <span th:text="${customer.name}">Guest</span></p>
    </div>
    <div>
        <a th:href="@{/booking/rooms}" style="background: white; color: #667eea; border: none; font-weight: 600; padding: 0.6rem 1.4rem; border-radius: 10px; text-decoration: none; margin-right: 0.5rem; box-shadow: 0 4px 14px rgba(0,0,0,0.15);">Book a Room</a>

        <a th:href="@{/booking/my-bookings}" style="background: rgba(255,255,255,0.95); color: #475569; border: none; font-weight: 600; padding: 0.6rem 1.4rem; border-radius: 10px; text-decoration: none; margin-right: 0.5rem; box-shadow: 0 4px 14px rgba(0,0,0,0.15);">My Bookings</a>

        <a th:href="@{/logout}" class="btn-logout">Sign Out</a>
    </div>
</div>

<div class="container pb-5">

    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>

    <div class="profile-grid">

        <div class="content-card">
            <div class="card-title">Account Summary</div>

            <div class="points-display">
                <div class="points-number" th:text="${customer.loyaltyPoints}">0</div>
                <div class="points-label">Loyalty Points</div>
            </div>

            <div class="info-row">
                <span class="info-label">Customer ID</span>
                <span class="info-value" th:text="${'#' + customer.id}">#1</span>
            </div>
            <div class="info-row">
                <span class="info-label">Email</span>
                <span class="info-value" th:text="${customer.email}">email</span>
            </div>
            <div class="info-row">
                <span class="info-label">Role</span>
                <span class="info-value" th:text="${customer.role}">CUSTOMER</span>
            </div>
        </div>

        <div class="content-card">
            <div class="card-title">Edit Details</div>
            <form th:action="@{/profile/update}" method="post">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" th:value="${customer.name}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:value="${customer.email}" readonly>
                    <small class="text-muted">Email cannot be changed</small>
                </div>

                <div class="mb-4">
                    <label class="form-label">Phone</label>
                    <input type="tel" name="phone" class="form-control" th:value="${customer.phone}" required>
                </div>

                <button type="submit" class="btn-save">Save Changes</button>
            </form>
        </div>

    </div>
</div>

</body>
</html>
