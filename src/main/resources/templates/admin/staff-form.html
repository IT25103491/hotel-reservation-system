<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Staff</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; min-height: 100vh; padding: 3rem 0; }
        .form-card { max-width: 580px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1); overflow: hidden; }
        .form-header { background: linear-gradient(135deg, #1e293b 0%, #475569 100%); color: white; padding: 2rem; }
        .form-header h2 { font-weight: 700; font-size: 1.5rem; margin: 0; }
        .form-body { padding: 2rem; }
        .form-label { font-weight: 500; font-size: 0.875rem; color: #334155; margin-bottom: 0.4rem; }
        .form-control { border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 0.7rem 0.9rem; font-size: 0.95rem; }
        .form-control:focus { border-color: #1e293b; outline: none; }
        .btn-save { background: linear-gradient(135deg, #1e293b 0%, #475569 100%); border: none; color: white; font-weight: 500; padding: 0.7rem 1.6rem; border-radius: 10px; }
        .btn-cancel { background: #f1f5f9; color: #475569; padding: 0.7rem 1.6rem; border-radius: 10px; margin-left: 0.5rem; text-decoration: none; }
    </style>
</head>
<body>

<div class="form-card">
    <div class="form-header"><h2>Add Staff Member</h2></div>
    <div class="form-body">
        <form th:action="@{/admin/staff/save}" th:object="${staff}" method="post">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" th:field="*{name}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" th:field="*{email}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-control" th:field="*{phone}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Initial Password</label>
                <input type="password" class="form-control" th:field="*{password}" required>
                <small class="text-muted">They can change it after first login</small>
            </div>

            <div class="mb-3">
                <label class="form-label">Position</label>
                <input type="text" class="form-control" th:field="*{position}" placeholder="e.g. Receptionist">
            </div>

            <div class="mb-4">
                <label class="form-label">Salary (Rs.)</label>
                <input type="number" step="0.01" class="form-control" th:field="*{salary}" placeholder="50000">
            </div>

            <button type="submit" class="btn-save">Add Staff</button>
            <a th:href="@{/admin/staff}" class="btn-cancel">Cancel</a>
        </form>
    </div>
</div>
</body>
</html>
