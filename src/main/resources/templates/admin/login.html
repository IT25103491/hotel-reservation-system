<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1e293b 0%, #334155 100%); min-height: 100vh; display: flex; align-items: center; padding: 2rem 0; }
        .auth-card { max-width: 420px; width: 100%; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, #1e293b 0%, #475569 100%); color: white; padding: 2.5rem 2rem; text-align: center; }
        .auth-header h2 { font-weight: 700; font-size: 1.6rem; margin: 0; }
        .auth-header p { opacity: 0.85; margin: 0.25rem 0 0; font-size: 0.9rem; }
        .auth-body { padding: 2rem; }
        .form-label { font-weight: 500; font-size: 0.875rem; color: #334155; margin-bottom: 0.4rem; }
        .form-control { border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 0.7rem 0.9rem; font-size: 0.95rem; }
        .form-control:focus { border-color: #1e293b; box-shadow: 0 0 0 3px rgba(30, 41, 59, 0.15); outline: none; }
        .btn-submit { width: 100%; background: linear-gradient(135deg, #1e293b 0%, #475569 100%); border: none; color: white; font-weight: 500; padding: 0.8rem; border-radius: 10px; }
        .alert-error { background: #fee2e2; color: #991b1b; padding: 0.8rem 1rem; border-radius: 10px; border-left: 4px solid #dc2626; font-size: 0.875rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Admin Portal</h2>
            <p>Staff and administrator access</p>
        </div>
        <div class="auth-body">
            <div th:if="${errorMessage}" class="alert-error" th:text="${errorMessage}"></div>
            <form th:action="@{/admin/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn-submit">Sign In</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
