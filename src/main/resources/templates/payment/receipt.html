<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Receipt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%); min-height: 100vh; padding: 2rem 0; display: flex; align-items: center; }
        .receipt-card { max-width: 520px; width: 100%; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1); overflow: hidden; }
        .receipt-header { background: linear-gradient(135deg, #10b981 0%, #047857 100%); color: white; padding: 3rem 2rem 2rem; text-align: center; }
        .check-circle { width: 64px; height: 64px; background: white; color: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; margin: 0 auto 1rem; }
        .receipt-header h2 { font-weight: 700; font-size: 1.6rem; margin: 0; }
        .receipt-header p { opacity: 0.9; margin: 0.25rem 0 0; }
        .receipt-body { padding: 2rem; }
        .txn-box { background: #f8fafc; text-align: center; padding: 1rem; border-radius: 10px; margin-bottom: 1.5rem; }
        .txn-label { color: #64748b; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .txn-id { font-family: 'Courier New', monospace; font-weight: 600; color: #1e293b; margin-top: 0.3rem; }
        .info-row { display: flex; justify-content: space-between; padding: 0.7rem 0; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .info-row:last-child { border: none; }
        .info-label { color: #64748b; }
        .info-value { font-weight: 500; }
        .total-row { background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%); padding: 1.2rem; border-radius: 12px; margin-top: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .total-amount { font-size: 1.5rem; font-weight: 700; color: #065f46; }
        .method-badge { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 8px; font-size: 0.8rem; font-weight: 600; }
        .method-Cash { background: #fef3c7; color: #92400e; }
        .method-Card { background: #dbeafe; color: #1e40af; }
        .actions { margin-top: 1.5rem; display: flex; gap: 0.5rem; }
        .btn-action { flex: 1; padding: 0.7rem; border-radius: 10px; text-align: center; text-decoration: none; font-weight: 500; }
        .btn-primary-action { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-secondary-action { background: #f1f5f9; color: #475569; }
        @media print { .actions, .topbar { display: none; } body { background: white; padding: 0; } }
    </style>
</head>
<body>

<div class="receipt-card">
    <div class="receipt-header">
        <div class="check-circle">✓</div>
        <h2>Payment Successful</h2>
        <p>Your booking is confirmed</p>
    </div>

    <div class="receipt-body">

        <div class="txn-box">
            <div class="txn-label">Transaction ID</div>
            <div class="txn-id" th:text="${payment.transactionId}">TXN12345</div>
        </div>

        <div class="info-row">
            <span class="info-label">Booking Reference</span>
            <span class="info-value" th:text="${'#' + payment.reservation.id}">#1</span>
        </div>
        <div class="info-row">
            <span class="info-label">Customer</span>
            <span class="info-value" th:text="${payment.reservation.customer.name}">Name</span>
        </div>
        <div class="info-row">
            <span class="info-label">Room</span>
            <span class="info-value" th:text="${payment.reservation.room.roomNumber}">101</span>
        </div>
        <div class="info-row">
            <span class="info-label">Stay</span>
            <span class="info-value" th:text="${payment.reservation.checkIn + ' → ' + payment.reservation.checkOut}">dates</span>
        </div>
        <div class="info-row">
            <span class="info-label">Payment Method</span>
            <span class="info-value">
                <span th:classappend="${'method-badge method-' + payment.paymentMethod}" th:text="${payment.paymentMethod}">Cash</span>
            </span>
        </div>
        <div class="info-row">
            <span class="info-label">Payment Date</span>
            <span class="info-value" th:text="${payment.paymentDate}">date</span>
        </div>
        <div class="info-row">
            <span class="info-label">Status</span>
            <span class="info-value" style="color: #065f46; font-weight: 600;" th:text="${payment.status}">COMPLETED</span>
        </div>

        <div class="total-row">
            <span style="color: #065f46; font-weight: 500;">Amount Paid</span>
            <span class="total-amount" th:text="${'Rs. ' + payment.amount}">Rs. 0</span>
        </div>

        <div class="actions">
            <a th:href="@{/booking/my-bookings}" class="btn-action btn-secondary-action">My Bookings</a>
            <a href="javascript:window.print()" class="btn-action btn-primary-action">Print Receipt</a>
        </div>
    </div>
</div>

</body>
</html>
